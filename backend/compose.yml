services:
  redis:
    image: redis:8.2-alpine
    container_name: my-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - backend

  db:
    image: postgres:14
    container_name: pg14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_NAME:-acom_db}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PG_USER:-postgres} -d ${PG_NAME:-acom_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: dockerfile
    container_name: integrador_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    entrypoint: ["/app/entrypoint.sh"]
    command:
      [
        "gunicorn",
        "integrador_de_chats.asgi:application",
        "-k",
        "uvicorn.workers.UvicornWorker",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "4",
      ]
    networks:
      - backend

  worker:
    build:
      context: .
      dockerfile: dockerfile
    container_name: integrador_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/app/entrypoint.sh"]
    # the concurrency=2 here needs to be adjusted to cpu core count, my vm is dualcore so its 2
    command:
      [
        "celery",
        "-A",
        "integrador_de_chats",
        "worker",
        "-l",
        "info",
        "--concurrency=2",
        "-Ofair",
      ]
    networks:
      - backend

  beat:
    build:
      context: .
      dockerfile: dockerfile
    container_name: integrador_beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/app/entrypoint.sh"]
    command: ["celery", "-A", "integrador_de_chats", "beat", "-l", "info"]
    networks:
      - backend

volumes:
  redis_data:
  db_data:
  static_volume:

networks:
  backend:
    driver: bridge
